name: prometheus
services:
  prometheus:
    container_name: linko-prometheus
    hostname: prometheus
    image: prom/prometheus:latest
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
  node-exporter:
    container_name: linko-node-exporter
    hostname: node_exporter
    image: prom/node-exporter:latest
    ports:
      - "127.0.0.1:9100:9100"
  grafana:
    container_name: linko-grafana
    hostname: grafana
    image: grafana/grafana:latest
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
    volumes:
      - data:/var/lib/grafana
  jaeger:
    container_name: linko-jaeger
    hostname: jaeger
    image: jaegertracing/all-in-one:latest
    ports:
      - "127.0.0.1:16686:16686"
      - "127.0.0.1:4317:4317"
      - "127.0.0.1:4318:4318"
volumes:
  data:
    external: false
    name: grafana-data
